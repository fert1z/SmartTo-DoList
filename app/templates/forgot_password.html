{% extends 'base.html' %}

{% block head_css %}
<link rel="stylesheet" href="/static/css/forgot_password.css">
{% endblock %}

{% block content %}
<div class="container">
    <h1>Восстановление пароля</h1>
    {% if error %}
    <p class="auth-alert auth-alert--error" role="alert">{{ error }}</p>
    {% endif %}
    {% if success %}
    <p class="auth-alert auth-alert--success" role="status">{{ success }}</p>
    {% endif %}
    <form action="/auth/forgot-password" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <button type="submit">Отправить ссылку</button>
    </form>
    <p>Вспомнили пароль? <a href="/auth/login">Вход в систему</a></p>
    <p>Нет аккаунта? <a href="/auth/register">Регистрация</a></p>
</div>
{% endblock %}
