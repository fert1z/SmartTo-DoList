{% extends 'base.html' %}

{% block title %}Регистрация — SmartTo-DoList{% endblock %}

{% block head_css %}
<link rel="stylesheet" href="/static/css/login.css">
{% endblock %}

{% block content %}
<main class="auth-main">
    <div class="auth-card auth-card--wide">
        <h2 class="auth-title">Регистрация</h2>
        {% if error %}
        <p class="auth-alert auth-alert--error" role="alert">{{ error }}</p>
        {% endif %}
        <form id="registration_form" action="/auth/register" method="post" class="auth-form" onsubmit="return validForm(event);">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" name="username" required autocomplete="username" minlength="3">

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email">

            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">

            <label for="confirm_password">Повтор пароля</label>
            <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password" minlength="8">

            <button type="submit" class="auth-submit">Создать аккаунт</button>
        </form>
        <p class="auth-footer">Уже есть аккаунт? <a href="/auth/login">Войти</a></p>
    </div>
</main>
{% endblock %}

{% block scripts %}
<script src="/static/js/registration.js"></script>
{% endblock %}
