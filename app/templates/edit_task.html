<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать задачу</title>
    <link rel="stylesheet" href="/static/css/navigation.css">
    <link rel="stylesheet" href="/static/css/main_page.css">
</head>
<body>
    <header>
        <div class="header-top">
            <h1><a href="/dashboard">SmartTo-DoList</a></h1>
            <nav>
                <a href="/dashboard">📊 Задачи</a>
                <a href="/addtask">➕ Создать</a>
                <a href="/account/profile">👤 Профиль</a>
                <a href="/account/settings">⚙️ Настройки</a>
                <a href="/auth/logout">🚪 Выход</a>
            </nav>
        </div>
    </header>
    <div class="container">
        <h1>Редактировать задачу</h1>
        <p id="edit-task-message" class="addtask-message" hidden role="status"></p>
        <form id="editTaskForm">
            <div class="form-group">
                <label for="task-title">Название задачи</label>
                <input type="text" id="task-title" name="task-title" required maxlength="200" placeholder="Название задачи">
            </div>
            <div class="form-group">
                <label for="task-description">Описание</label>
                <textarea id="task-description" name="task-description" rows="4" placeholder="Описание задачи"></textarea>
            </div>
            <div class="form-group">
                <label for="task-priority">Приоритет</label>
                <select id="task-priority" name="priority">
                    <option value="low">Низкий</option>
                    <option value="medium">Средний</option>
                    <option value="high">Высокий</option>
                </select>
            </div>
            <div class="form-group">
                <label for="task-category">Категория</label>
                <select id="task-category" name="category">
                    <option value="personal">Личное</option>
                    <option value="work">Работа</option>
                    <option value="study">Учёба</option>
                </select>
            </div>
            <div class="form-group">
                <label for="task-datetime">Срок</label>
                <input type="datetime-local" id="task-datetime" name="task-datetime">
            </div>
            <button type="submit" class="btn-save">Сохранить изменения</button>
            <button type="button" class="btn-cancel" onclick="history.back()">Отмена</button>
        </form>
    </div>
    <script src="/static/js/edit_task.js"></script>
</body>
</html>
