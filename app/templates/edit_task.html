<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>
    <link rel="stylesheet" href="/static/css/navigation.css">
    <link rel="stylesheet" href="/static/css/main_page.css">
</head>
<body>
    <header>
        <div class="header-top">
            <h1><a href="/dashboard">SmartTo-DoList</a></h1>
            <nav>
                <a href="/dashboard">📊 Задачи</a>
                <a href="/addtask">➕ Создать</a>
                <a href="/account/profile">👤 Профиль</a>
                <a href="/account/settings">⚙️ Настройки</a>
                <a href="/auth/logout">🚪 Выход</a>
            </nav>
        </div>
    </header>
    <div class="container">
        <h1>Редактировать задачу</h1>
        <form id="editTaskForm">
            <div class="form-group">
                <label for="taskTitle">Task Title:</label>
                <input type="text" id="taskTitle" name="taskTitle" required>
            </div>
            
            <div class="form-group">
                <label for="taskDescription">Description:</label>
                <textarea id="taskDescription" name="taskDescription" rows="4"></textarea>
            </div>
            
            <div class="form-group">
                <label for="taskDue">Due Date:</label>
                <input type="date" id="taskDue" name="taskDue">
            </div>
            
            <button type="submit" class="btn-save">Save Changes</button>
            <button type="button" class="btn-cancel" onclick="history.back()">Cancel</button>
        </form>
    </div>
    <script src="../scripts/edit_task.js"></script>
</body>
</html>
