{% extends 'base.html' %}

{% block title %}Вход — SmartTo-DoList{% endblock %}

{% block head_css %}
<link rel="stylesheet" href="/static/css/login.css">
{% endblock %}

{% block content %}
<main class="auth-main">
    <div class="auth-card">
        <h2 class="auth-title">Вход</h2>
        {% if error %}
        <p class="auth-alert auth-alert--error" role="alert">{{ error }}</p>
        {% endif %}
        <form action="/auth/login" method="post" class="auth-form" onsubmit="return validLogin(event);">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" name="username" required autocomplete="username">

            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">

            <button type="submit" class="auth-submit">Войти</button>
        </form>
        <p class="auth-footer">
            Нет аккаунта? <a href="/auth/register">Зарегистрироваться</a><br>
            <a href="/auth/forgot-password">Забыли пароль?</a>
        </p>
    </div>
</main>
{% endblock %}

{% block scripts %}
<script src="/static/js/login.js"></script>
{% endblock %}
