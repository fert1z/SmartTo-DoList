<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — SmartTo-DoList</title>
    <link rel="stylesheet" href="/static/css/navigation.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <header>
        <div class="header-top">
            <h1><a href="/">SmartTo-DoList</a></h1>
            <nav>
                <a href="/">Главная</a>
                <a href="/about">О проекте</a>
                <a href="/auth/register">Регистрация</a>
            </nav>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <h2 class="auth-title">Вход</h2>
            {% if error %}
            <p class="auth-alert auth-alert--error" role="alert">{{ error }}</p>
            {% endif %}
            <form action="/auth/login" method="post" class="auth-form" onsubmit="return validLogin(event);">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" name="username" required autocomplete="username">

                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">

                <button type="submit" class="auth-submit">Войти</button>
            </form>
            <p class="auth-footer">
                Нет аккаунта? <a href="/auth/register">Зарегистрироваться</a><br>
                <a href="/auth/forgot-password">Забыли пароль?</a>
            </p>
        </div>
    </main>
    <script src="/static/js/login.js"></script>
</body>
</html>
