<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="/static/css/navigation.css">
    <link rel="stylesheet" href="/static/css/reset_password.css">
</head>
<body>
    <header>
        <div class="header-top">
            <h1><a href="/">SmartTo-DoList</a></h1>
            <nav>
                <a href="/">Главная</a>
                <a href="/about">О проекте</a>
                <a href="/auth/login">Вход</a>
            </nav>
        </div>
    </header>
    <div class="container">
        <h1>Сброс пароля</h1>
        {% if error %}
        <p class="auth-alert auth-alert--error" role="alert">{{ error }}</p>
        {% endif %}
        {% if success %}
        <p class="auth-alert auth-alert--success" role="status">{{ success }}</p>
        {% endif %}
        <form action="/auth/reset-password" method="post">
            <input type="hidden" name="token" value="{{ token if token else '' }}">
            <div class="form-group">
                <label for="password">Новый пароль</label>
                <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">
            </div>
            <div class="form-group">
                <label for="confirm-password">Подтверждение пароля</label>
                <input type="password" id="confirm-password" name="confirm_password" required autocomplete="new-password" minlength="8">
            </div>
            <button type="submit">Сбросить пароль</button>
        </form>
        <p>Помните пароль? <a href="/auth/login">Вход в систему</a></p>
    </div>
</body>
</html>
