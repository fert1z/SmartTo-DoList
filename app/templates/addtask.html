{% extends 'base.html' %}

{% block title %}Новая задача — SmartTo-DoList{% endblock %}

{% block head_css %}
<link rel="stylesheet" href="/static/css/addtask.css">
{% endblock %}

{% block content %}
<main class="addtask-main">
    <div class="addtask-header">
        <h2 class="page-title-addtask">Новая задача</h2>
        <a href="/dashboard" class="link-back">← К списку</a>
    </div>

    <p id="addtask-message" class="addtask-message" hidden role="status"></p>

    <form id="add-task-form" class="addtask-form-card">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label for="task-title">Название <span class="req">*</span></label>
        <input type="text" id="task-title" name="task-title" required maxlength="200" placeholder="Например: Купить хлеб">

        <label for="task-description">Описание</label>
        <textarea id="task-description" name="task-description" rows="4" placeholder="Детали (необязательно)"></textarea>

        <div class="form-row-2">
            <div>
                <label for="task-priority">Приоритет</label>
                <select id="task-priority" name="priority">
                    <option value="low">Низкий</option>
                    <option value="medium" selected>Средний</option>
                    <option value="high">Высокий</option>
                </select>
            </div>
            <div>
                <label for="task-category">Категория</label>
                <select id="task-category" name="category">
                    <option value="personal">Личное</option>
                    <option value="work">Работа</option>
                    <option value="study">Учёба</option>
                </select>
            </div>
        </div>

        <div style="margin-top: 1rem;">
            <label for="due-date-method">Способ установки срока</label>
            <select id="due-date-method">
                <option value="none" selected>Без срока</option>
                <option value="exact">Точная дата (календарь)</option>
                <option value="smart">"Умный" ввод (текстом)</option>
            </select>
        </div>

        <div id="due-date-exact-block" class="due-date-block" hidden>
            <label for="task-datetime-exact">Точный срок</label>
            <input type="datetime-local" id="task-datetime-exact" name="due_date_exact">
        </div>

        <div id="due-date-smart-block" class="due-date-block" hidden>
            <label for="task-datetime-smart">"Умный" срок</label>
            <input type="text" id="task-datetime-smart" name="due_date_smart" placeholder="Например: завтра в 18:00">
        </div>

        <button type="submit" class="btn-submit-task">Сохранить задачу</button>
    </form>

</main>
{% endblock %}

{% block scripts %}
<script src="/static/js/addtask.js"></script>
{% endblock %}
